{% extends "_base.html" %}
{% block title %}
    Change Password | Django Starter Template
{% endblock title %}
{% block content %}
    <section class="mx-auto my-10 w-full max-w-md rounded-lg border border-base-300 bg-base-100 p-6 shadow-md"
             aria-labelledby="change-password-title">
        <h1 id="change-password-title" class="text-2xl font-semibold">Change your password</h1>
        <p class="mt-2 text-sm text-base-content/70">Enter your current password and choose a new one.</p>
        <form method="post"
              action="{% url "account_change_password" %}"
              class="mt-6 space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-full">Change password</button>
        </form>
        <p class="mt-4 text-sm text-base-content/70">
            <a href="{% url "account_reset_password" %}" class="link link-primary">Forgot your password?</a>
        </p>
    </section>
{% endblock content %}
