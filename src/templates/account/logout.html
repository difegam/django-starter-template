{% extends "_base.html" %}
{% block title %}
    Sign Out | Django Starter Template
{% endblock title %}
{% block content %}
    <section class="mx-auto my-10 w-full max-w-md rounded-lg border border-base-300 bg-base-100 p-6 shadow-md"
             aria-labelledby="logout-title">
        <h1 id="logout-title" class="text-2xl font-semibold">Sign out</h1>
        <p class="mt-2 text-sm text-base-content/70">Are you sure you want to sign out?</p>
        <form method="post"
              action="{% url "account_logout" %}"
              class="mt-6 space-y-4">
            {% csrf_token %}
            {% if redirect_field_value %}
                <input type="hidden"
                       name="{{ redirect_field_name }}"
                       value="{{ redirect_field_value }}" />
            {% endif %}
            <button type="submit" class="btn btn-error w-full">Sign out</button>
        </form>
        <p class="mt-4 text-sm text-base-content/70">
            <a href="{% url "home" %}" class="link link-primary">Go back home</a>
        </p>
    </section>
{% endblock content %}
